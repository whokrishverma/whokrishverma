name: Update contribution heatmap

on:
  schedule:
    - cron: "30 18 * * *"   # 18:30 UTC = 12:00 AM IST (Mumbai time)
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Render animated contribution heatmap SVG
        run: python generate_streak_svg_v1.py whokrishverma contrib-heatmap.svg

      - name: Commit updated art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution heatmap [skip ci]"
          file_pattern: "contrib-heatmap.svg"